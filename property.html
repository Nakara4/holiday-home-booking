<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Property Details</h1>
        <a href="index.html" class="back-btn">⬅ Back to Home</a>
        <a href="bookings.html" class="view-bookings-btn">View My Bookings</a>

    </header>
    <main>
 
        <div id="property-details" class="property-details">   
            <!-- Property details will be loaded here dynamically -->
        </div>

        <div id="bookingSummary" class="booking-summary-panel" aria-live="polite">
            <div>
                <p class="booking-summary-label">Booking summary</p>
                <h2>Choose your dates</h2>
                <p id="bookingSummaryText">Select your check-in and check-out dates to see the total cost.</p>
            </div>
            <div class="booking-summary-grid">
                <div>
                    <span class="summary-key">Nightly rate</span>
                    <strong id="summaryNightlyRate">$0</strong>
                </div>
                <div>
                    <span class="summary-key">Nights</span>
                    <strong id="summaryNights">0</strong>
                </div>
                <div>
                    <span class="summary-key">Total</span>
                    <strong id="summaryTotal">$0</strong>
                </div>
            </div>
        </div>
       
         <!-- Booking Form -->
         <div class="booking-form">
            <h2>Book This Home</h2>
            <form id="bookingForm">
                <input type="hidden" id="propertyId">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <input type="date" id="checkIn" required>
                <input type="date" id="checkOut" required>
                
                <!-- Payment section -->
                <div id="payment-section">
                    <div id="card-element" class="stripe-card-element"></div>
                    <div id="card-errors" role="alert"></div>
                </div>
                
                <button type="submit" id="submit-btn">Book Now ($<span id="total-amount">0</span>)</button>
            </form>
            
            <p id="confirmationMessage" class="hidden"></p>
        </div>
    </main>

    <script src="https://js.stripe.com/v3/"></script>
    <script src="script.js"></script>

</body>
</html>
